<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>초기 설정 · e-noble 광고 보고서</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{brand:{50:'#eef3ff',500:'#4066f5',600:'#2c4fe0',700:'#233fc0'}},fontFamily:{sans:['Pretendard','system-ui','sans-serif']}}}}</script>
  <style>body{font-family:Pretendard,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    @keyframes pop{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}.pop{animation:pop .4s cubic-bezier(.2,.8,.2,1) both}</style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 bg-slate-50 relative overflow-hidden">
  <div class="absolute inset-0 -z-10 bg-[radial-gradient(120%_120%_at_50%_-20%,#eef3ff_0%,#f8fafc_45%,#f8fafc_100%)]"></div>
  <div class="w-full max-w-sm pop">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-gradient-to-br from-brand-500 to-brand-700 rounded-2xl flex items-center justify-center mx-auto mb-4 text-white text-2xl font-extrabold shadow-lg shadow-brand-600/25">e</div>
      <h1 class="text-[22px] font-bold text-slate-900 tracking-tight">관리자 계정 설정</h1>
      <p class="text-sm text-slate-400 mt-1">최초 1회만 표시됩니다</p>
    </div>
    <div class="bg-white/90 backdrop-blur rounded-2xl shadow-[0_8px_40px_-12px_rgb(15_23_42/0.18)] border border-slate-200/70 p-7">
      <form method="post" action="/setup" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1.5">이름</label>
          <input type="text" name="name" required placeholder="홍길동"
                 class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/40 focus:border-brand-400 transition" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1.5">이메일</label>
          <input type="email" name="email" required placeholder="admin@e-noble.kr"
                 class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/40 focus:border-brand-400 transition" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1.5">비밀번호 <span class="font-normal text-slate-400">(8자 이상)</span></label>
          <input type="password" name="password" required minlength="8" placeholder="••••••••"
                 class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/40 focus:border-brand-400 transition" />
        </div>
        <button type="submit"
                class="w-full bg-brand-600 hover:bg-brand-700 active:scale-[.99] text-white font-semibold py-2.5 rounded-xl text-sm shadow-lg shadow-brand-600/20 transition-all">
          관리자 계정 생성
        </button>
      </form>
    </div>
  </div>
</body>
</html>
