# crama.app nginx 설정 예시
# /etc/nginx/sites-available/report.crama.app

server {
    listen 80;
    server_name report.crama.app;

    # HTTPS 리다이렉트 (certbot으로 SSL 설정 후 자동 추가됨)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name report.crama.app;

    # SSL 인증서 (certbot: sudo certbot --nginx -d report.crama.app)
    ssl_certificate /etc/letsencrypt/live/report.crama.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/report.crama.app/privkey.pem;

    # 파일 업로드 크기 제한 (50MB)
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 보고서 생성 시간이 길 수 있으므로 타임아웃 늘림
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
